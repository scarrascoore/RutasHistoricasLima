<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitácora: Aventura en Lima</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />

    <!-- CSS propio -->
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <!-- Modal Flotante (VISTA) -->
    <div id="modal-overlay">
        <div class="modal-content" id="modal-content-box">
            <div class="close-modal" id="btn-close-modal">
                <i data-lucide="x" class="w-6 h-6"></i>
            </div>

            <div class="mb-4">
                <h2 id="modal-title" class="museum-name text-2xl text-slate-800 uppercase tracking-tight">Cargando...</h2>
                <div class="h-1 w-20 bg-amber-400 mt-1"></div>
            </div>

            <div id="modal-map-container">
                <iframe
                    id="modal-iframe"
                    src=""
                    width="100%"
                    height="100%"
                    style="border: 0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>
            </div>

            <p class="handwritten text-xl text-center mt-6 text-amber-900">¡Ubicación lista para tu aventura!</p>
        </div>
    </div>

    <!-- Contenedor Principal (VISTA) -->
    <div class="notebook-surface max-w-7xl mx-auto p-6 md:p-12 overflow-hidden">
        <header class="relative text-center py-16 mb-20 bg-white/40 rounded-3xl border-2 border-white/50 shadow-sm">
            <div class="absolute -top-10 -right-4 md:right-10 rotate-12 z-30">
                <div class="sticky-note p-6 text-sm font-bold w-44">
                    <p class="handwritten text-2xl text-amber-900 leading-tight">¡No olvides la cámara!</p>
                </div>
            </div>

            <h1 class="handwritten text-7xl md:text-9xl text-[#5d4037] mb-4 drop-shadow-md">Mi Ruta Limeña</h1>
            <p class="text-amber-900/60 font-bold tracking-[0.3em] uppercase text-xs">Itinerario del Centro Histórico</p>

            <div class="flex flex-wrap justify-center gap-4 mt-10">
                <div class="bg-white/90 backdrop-blur shadow-sm text-slate-700 px-6 py-2 rounded-lg font-bold text-sm border-b-4 border-slate-200">
                    S/ 27.00 Total
                </div>
                <div class="bg-white/90 backdrop-blur shadow-sm text-slate-700 px-6 py-2 rounded-lg font-bold text-sm border-b-4 border-slate-200">
                    9 Paradas Imperdibles
                </div>
            </div>
        </header>

        <div id="itinerary-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 relative z-10">
            <!-- Renderizado dinámico -->
        </div>

        <footer class="mt-28 text-center pb-16">
            <div class="inline-block relative">
                <div class="w-full h-3 bg-amber-200 absolute bottom-1 -z-10 opacity-60"></div>
                <p class="handwritten text-5xl text-amber-900">¡Será un día inolvidable!</p>
            </div>
            <p class="mt-6 text-[10px] uppercase tracking-widest font-black opacity-40 italic">Derechos reservados © 2026</p>
        </footer>
    </div>

    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Inicializador MVC -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
